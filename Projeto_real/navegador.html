<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuanOS</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            margin: auto;
            background-image: url('sample4.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        .e-mail {
            padding: 30px;
            display: inline-block;
            position: relative;
        }
        picture {
            user-select: none;
        }
        picture figcaption {
            padding-left: 25px;
            color: rgb(94, 94, 94);
        }
        .lixeira {
            padding: 31px;
            display: block;
            position: relative;
            max-width: 50px;
        }
        .botao {
            position: absolute;
            transform: translate(-50%, -50%);
            opacity: 0%;
        }
        .e-mail .botao {
            top: 45%;
            left: 50%;
            width: 83px;
            height: 65px;
        }
        .lixeira img {
            padding-left: 5px;
        }
        .lixeira .botao {
            top: 47%;
            left: 65%;
            width: 77px;
            height: 87px;
        }
        button:hover {
            cursor: pointer;
        }
        
        
    </style>
</head>
<body>
    <div class="e-mail">
        <picture>
            <a href="email.html">
                <img src="imagens/email2.png" alt="e-mail">
                <button class="botao">aqui</button>
            </a>
            <figcaption>E-mail</figcaption>
        </picture>
    </div>
    <div class="lixeira">
        <picture>
            <a href="lixeira.html">
                <img src="imagens/lixeira2.png" alt="lixeira">
                <button class="botao">aqui</button>
            </a>
            <figcaption>Lixeira</figcaption>
        </picture>
    </div>
</body>
</html>
