<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../favicon/sol.ico" type="image/x-icon">
    <meta http-equiv="refresh" content="10;lua1.html">
    <title>Sol</title>
    <style>
        body {
            background-image: linear-gradient(to right, yellow, orange);
            margin: 1px;
        }
        button {
            border: none;
            padding: 0px;
        }
        div {
            padding: 25px;
            position: absolute;
        }
        p {
            position: absolute;
            color: white;
            font-size: 23px;
            display: none;
            margin: 0px;
        }
        div,button:hover {
            cursor: pointer;
        }
        .n1,#texto1  {
            right: 0;
            top: 0;
        }
        .n2 {
            right: 0;
            bottom: 0;
        }
        .n3 {
            left: 0;
            top: 0;
        }
        .n4 {
            margin: 400px 800px;
        }
        .n5 {
            left: 0;
            margin-top: 300px;
        }
        .n6,#texto2 {
            bottom: 0;
            left: 0;
        }
        .n7 {
            margin-top: 180px;
            margin-left: 1100px;
        }
        .n8 {
            bottom: 0;
            margin-left: 1000px;
        }
        a {
            position: absolute;
            color: blue;
            padding-top: 0px;
            margin-left: 740px;
            margin-top: 720px;
        }
        a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <button onclick="document.getElementById('texto1').style.display='block'">
        <div class="n1"></div>
        <p id="texto1">N 1</p>
    </button>
    <div class="n2"></div>
    <div class="n3"></div>
    <div class="n4"></div>
    <div class="n5"></div>
    <button onclick="document.getElementById('texto2').style.display='block'">
        <div class="n6"></div>
        <p id="texto2">E 2</p>
    </button>
    <div class="n7"></div>
    <div class="n8"></div>
    <a href="senha_final.html">Voltar</a>
</body>
</html>
