<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../favicon/lua.ico" type="image/x-icon">
    <meta http-equiv="refresh" content="10;sol2.html">
    <title>Lua</title>
    <style>
        body {
            background-image: linear-gradient(to right,darkblue, purple);
            margin: 1px;
        }
        button {
            border: none;
            padding: 0px;
        }
        div {
            padding: 25px;
            position: absolute;
        }
        p {
            position: absolute;
            color: white;
            font-size: 23px;
            display: none;
            margin: 0px;
        }
        div,button:hover {
            cursor: pointer;
        }
        .n1,#texto1 {
            margin-top: 300px;
            margin-left: 350px;
        }
        .n2 {
            margin-top: 600px;
            margin-left: 1200px;
        }
        .n3 {
            top: 0;
            margin-left: 700px;
        }
        .n4 {
            right: 0;
            margin-top: 400px;
        }
        .n5 {
            margin-top: 50px;
            margin-left: 1400px;
        }
        .n6,#texto2 {
            margin-top: 650px;
            margin-left: 250px;
        }
        .n7 {
            margin-left: 800px;
            margin-top: 400px;
        }
        .n8 {
            margin: 20px;
        }
        a {
            position: absolute;
            color: yellow;
            padding-top: 0px;
            margin-left: 740px;
            margin-top: 720px;
        }
        a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <button onclick="document.getElementById('texto1').style.display='block'">
        <div class="n1"></div>
        <p id="texto1">C 3</p>
    </button>
    <div class="n2"></div>
    <div class="n3"></div>
    <div class="n4"></div>
    <div class="n5"></div>
    <button onclick="document.getElementById('texto2').style.display='block'">
        <div class="n6"></div>
        <p id="texto2">R 4</p>
    </button>
    <div class="n7"></div>
    <div class="n8"></div>
    <a href="senha_final.html">Voltar</a>
</body>
</html>
